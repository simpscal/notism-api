services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

  api:
    image: ${API_IMAGE}
    container_name: notism-api
    expose:
      - "5000"
    env_file:
      - .env.api
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
