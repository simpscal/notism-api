name: Prepare Environment
description: Emit the production environment and .NET environment values.

outputs:
  environment:
    description: GitHub environment name (prod)
    value: ${{ steps.set-env.outputs.environment }}
  dotnet-env:
    description: ASPNETCORE_ENVIRONMENT value (Production)
    value: ${{ steps.set-env.outputs.dotnet-env }}

runs:
  using: composite
  steps:
    - name: Decide Target Environment
      id: set-env
      shell: bash
      run: |
        echo "environment=prod" >> "$GITHUB_OUTPUT"
        echo "dotnet-env=Production" >> "$GITHUB_OUTPUT"
