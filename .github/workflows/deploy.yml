name: Deploy API to AWS EC2

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'src/Notism.Api/**'
      - 'src/Notism.Application/**'
      - 'src/Notism.Domain/**'
      - 'src/Notism.Infrastructure/**'
      - 'src/Notism.Shared/**'
      - 'Dockerfile'
      - 'Directory.Packages.props'
      - 'Directory.Build.props'
      - '.github/workflows/deploy.yml'

env:
  DOTNET_VERSION: "9.0.x"
  IMAGE_TAG: ${{ github.sha }}

jobs:
  prepare:
    name: Prepare Deployment Context
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      dotnet-env: ${{ steps.set-env.outputs.dotnet-env }}
    steps:
      - name: Decide Target Environment
        id: set-env
        run: |
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "environment=prod" >> "$GITHUB_OUTPUT"
            echo "dotnet-env=Production" >> "$GITHUB_OUTPUT"
          else
            echo "environment=dev" >> "$GITHUB_OUTPUT"
            echo "dotnet-env=Development" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: prepare
    environment: ${{ needs.prepare.outputs.environment }}
    permissions:
      contents: read
      id-token: write
    outputs:
      ecr-registry: ${{ steps.ecr-login.outputs.registry }}
      image-uri: ${{ steps.build.outputs.image-uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --build-arg ASPNETCORE_ENVIRONMENT=${{ needs.prepare.outputs.dotnet-env }} \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:${{ env.IMAGE_TAG }}" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            --push \
            -f Dockerfile .
          echo "image-uri=$ECR_REGISTRY/$ECR_REPOSITORY:${{ env.IMAGE_TAG }}" >> "$GITHUB_OUTPUT"

      - name: Clean up untagged images
        if: github.ref_name == 'main'
        env:
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        run: |
          IMAGE_IDS=$(aws ecr list-images --repository-name "$ECR_REPOSITORY" --filter tagStatus=UNTAGGED --query 'imageIds[*]' --output json)
          if [[ "$IMAGE_IDS" != "[]" ]]; then
            aws ecr batch-delete-image --repository-name "$ECR_REPOSITORY" --image-ids "$IMAGE_IDS"
          fi

  deploy-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [prepare, build-and-push]
    environment: ${{ needs.prepare.outputs.environment }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to EC2 via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_REGISTRY: ${{ needs.build-and-push.outputs.ecr-registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          CONTAINER_NAME: notism-api
        run: |
          echo "Deploying $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG to $EC2_HOST"
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=accept-new "${EC2_USER:-ec2-user}@$EC2_HOST" << EOF
            set -e
            export AWS_REGION="$AWS_REGION"
            export ECR_REGISTRY="$ECR_REGISTRY"
            export ECR_REPOSITORY="$ECR_REPOSITORY"
            export IMAGE_TAG="$IMAGE_TAG"
            export CONTAINER_NAME="$CONTAINER_NAME"
            # Login to ECR (uses EC2 instance profile)
            aws ecr get-login-password --region "\$AWS_REGION" | docker login --username AWS --password-stdin "\$ECR_REGISTRY"
            # Pull new image
            docker pull "\$ECR_REGISTRY/\$ECR_REPOSITORY:\$IMAGE_TAG"
            # Restart container (optional: create /opt/notism/.env with ConnectionStrings__DefaultConnection, etc.)
            docker stop "\$CONTAINER_NAME" 2>/dev/null || true
            docker rm "\$CONTAINER_NAME" 2>/dev/null || true
            ENV_FILE_OPT=""
            [ -f /opt/notism/.env ] && ENV_FILE_OPT="--env-file /opt/notism/.env"
            docker run -d \\
              --name "\$CONTAINER_NAME" \\
              -p 5000:5000 \\
              --restart unless-stopped \\
              -e ASPNETCORE_ENVIRONMENT=Production \\
              \$ENV_FILE_OPT \\
              "\$ECR_REGISTRY/\$ECR_REPOSITORY:\$IMAGE_TAG"
            docker image prune -f
            echo "Deployed and running."
          EOF
