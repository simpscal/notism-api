name: Deploy API to AWS EC2

on:
  push:
    branches:
      - main
      - dev

env:
  DOTNET_VERSION: "9.0.x"
  IMAGE_TAG: ${{ github.sha }}

jobs:
  prepare:
    name: Prepare Deployment Context
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      dotnet-env: ${{ steps.env.outputs.dotnet-env }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Determine environment
        id: env
        uses: ./.github/actions/prepare-env

  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: prepare
    environment: ${{ needs.prepare.outputs.environment }}
    permissions:
      contents: read
      id-token: write
    outputs:
      ecr-registry: ${{ steps.build.outputs.ecr-registry }}
      image-uri: ${{ steps.build.outputs.image-uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build and push image
        id: build
        uses: ./.github/actions/build-push-ecr
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}
          ecr-repository: ${{ secrets.ECR_REPOSITORY }}
          image-tag: ${{ env.IMAGE_TAG }}
          dotnet-env: ${{ needs.prepare.outputs.dotnet-env }}

  deploy-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [prepare, build-and-push]
    environment: ${{ needs.prepare.outputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Checkout compose file
        uses: actions/checkout@v5
        with:
          sparse-checkout: docker-compose.yml
          sparse-checkout-cone-mode: false

      - name: Prepare deploy files
        env:
          CONNECTION_STRING: ${{ secrets.CONNECTION_STRING }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MAILERSEND_API_KEY: ${{ secrets.MAILERSEND_API_KEY }}
          CLIENT_APP_URL: ${{ vars.CLIENT_APP_URL }}
          AWS_REGION_ENV: ${{ vars.AWS_REGION }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          ECR_REGISTRY: ${{ needs.build-and-push.outputs.ecr-registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        run: |
          mkdir -p .deploy

          cp docker-compose.yml .deploy/docker-compose.yml

          {
            printf 'ASPNETCORE_ENVIRONMENT=Production\n'
            printf 'ConnectionStrings__DefaultConnection=%s\n' "$CONNECTION_STRING"
            printf 'JwtSettings__Secret=%s\n' "$JWT_SECRET"
            printf 'Email__ApiKey=%s\n' "$MAILERSEND_API_KEY"
            printf 'ClientApp__Url=%s\n' "$CLIENT_APP_URL"
            printf 'AWS__Region=%s\n' "$AWS_REGION_ENV"
            printf 'GoogleOAuth__ClientId=%s\n' "$GOOGLE_OAUTH_CLIENT_ID"
            printf 'GoogleOAuth__ClientSecret=%s\n' "$GOOGLE_OAUTH_CLIENT_SECRET"
          } > .deploy/.env.api

          {
            printf 'API_IMAGE=%s/%s:%s\n' "$ECR_REGISTRY" "$ECR_REPOSITORY" "$IMAGE_TAG"
            printf 'DB_PASSWORD=%s\n' "$DB_PASSWORD"
          } > .deploy/.env

          echo "Deploy files prepared."

      - name: Deploy to EC2 via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          ECR_REGISTRY: ${{ needs.build-and-push.outputs.ecr-registry }}
        run: |
          SSH_KEY_PATH="$HOME/.ssh/deploy_key.pem"
          SSH_OPTS="-i $SSH_KEY_PATH -o StrictHostKeyChecking=accept-new"
          REMOTE="${EC2_USER:-ec2-user}@$EC2_HOST"

          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" | sed 's/\r$//' > "$SSH_KEY_PATH"
          chmod 600 "$SSH_KEY_PATH"
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          ssh $SSH_OPTS "$REMOTE" "sudo mkdir -p /opt/notism && sudo chown \$(id -u):\$(id -g) /opt/notism"
          scp $SSH_OPTS .deploy/.env .deploy/.env.api .deploy/docker-compose.yml "$REMOTE:/opt/notism/"

          ssh $SSH_OPTS "$REMOTE" << REMOTE_SCRIPT
          set -e
          aws ecr get-login-password --region "$AWS_REGION" | \
            sudo docker login --username AWS --password-stdin "$ECR_REGISTRY"

          cd /opt/notism
          sudo docker compose up -d --pull always
          sudo docker image prune -af

          echo "Deployed and running."
          REMOTE_SCRIPT
