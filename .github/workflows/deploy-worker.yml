name: Deploy Worker to AWS ECS

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'src/Notism.Worker/**'
      - 'src/Notism.Domain/**'
      - 'src/Notism.Infrastructure/**'
      - 'src/Notism.Shared/**'
      - 'Dockerfile.Worker'
      - '.github/workflows/deploy-worker.yml'

env:
  DOTNET_VERSION: "9.0.x"
  IMAGE_TAG: ${{ github.sha }}

jobs:
  prepare:
    name: Prepare Deployment Context
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      dotnet-env: ${{ steps.env.outputs.dotnet-env }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Determine environment
        id: env
        uses: ./.github/actions/prepare-env

  deploy:
    name: Build and Deploy Worker
    runs-on: ubuntu-latest
    needs: prepare
    environment: ${{ needs.prepare.outputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Notism.sln

      - name: Build and push image
        id: build
        uses: ./.github/actions/build-push-ecr
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}
          ecr-repository: ${{ secrets.ECR_REPOSITORY_WORKER }}
          image-tag: ${{ env.IMAGE_TAG }}
          dotnet-env: ${{ needs.prepare.outputs.dotnet-env }}
          dockerfile: Dockerfile.Worker

      - name: Fetch task definition
        id: fetch-task-def
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.ECS_TASK_DEFINITION_WORKER }} \
            --query 'taskDefinition' > task-definition-raw.json
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy, .enableFaultInjection)' \
            task-definition-raw.json > task-definition.json

      - name: Render task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ secrets.ECS_CONTAINER_NAME_WORKER }}
          image: ${{ steps.build.outputs.ecr-registry }}/${{ secrets.ECR_REPOSITORY_WORKER }}:${{ env.IMAGE_TAG }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE_WORKER }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true
          force-new-deployment: true
